
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- Defaults before JS; each route overrides via Seo (react-helmet). Match src/hooks/useSeo.tsx English fallbacks. -->
    <title>Pulse: New Friends and IRL Plans</title>
    <meta name="title" content="Pulse: New Friends and IRL Plans" />
    <meta name="description" content="Meet like-minded people in your city and plan real-life meetups with Pulse. AI-powered group matching for meaningful friendships." />
    <meta property="og:title" content="Pulse: New Friends and IRL Plans" />
    <meta property="og:description" content="Meet like-minded people in your city and plan real-life meetups with Pulse. AI-powered group matching for meaningful friendships." />
    <meta property="og:type" content="website" />

    <link rel="icon" type="image/png" href="https://s.kikiapp.eu/img/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="https://s.kikiapp.eu/img/favicon/favicon.svg" />
    <link rel="shortcut icon" href="https://s.kikiapp.eu/img/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="https://s.kikiapp.eu/img/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="/img/favicon/site.webmanifest" />

    
    <meta name="author" content="Pulse Now Co." />
    <meta name="twitter:site" content="@pulsefriendsirl" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pulse: New Friends and IRL Plans" />
    <meta name="twitter:description" content="Meet like-minded people in your city and plan real-life meetups with Pulse. AI-powered group matching for meaningful friendships." />

    <!-- Default social image; pages override via Seo (react-helmet) after load -->
    <meta property="og:image" content="https://s.kikiapp.eu/desktop/socialimage.png" />
    <meta name="twitter:image" content="https://s.kikiapp.eu/desktop/socialimage.png" />
    
    <!-- Per-page Open Graph / Twitter (url, locale, images) set by Seo after load -->
    
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- API sharding: hash % 4 → api, api2, api3, api4 (see src/lib/urlShard.ts) -->
    <link rel="preconnect" href="https://api.kikiapp.eu" crossorigin>
    <link rel="preconnect" href="https://api2.kikiapp.eu" crossorigin>
    <link rel="preconnect" href="https://api3.kikiapp.eu" crossorigin>
    <link rel="preconnect" href="https://api4.kikiapp.eu" crossorigin>
    <!-- KIKI_PREFETCH_CONFIG -->
    <script defer src="/kiki-api-prefetch.js"></script>
    <!-- Google Fonts: preload then apply on load (non-render-blocking) -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"></noscript>
    <link rel="preload" as="image" href="/placeholder.svg" imagesrcset="/placeholder.svg" imagesizes="100vw" />
    
  </head>

  <body>
    
    
    <div id="root"></div>
    <!-- Meta Pixel noscript fallback -->
    <noscript>
      <img
        height="1"
        width="1"
        style="display:none"
        src="https://www.facebook.com/tr?id=1935826830293991&ev=PageView&noscript=1"
      />
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Deferred after main: lang → GA/Meta/ManyChat (after app-ready). dataLayer init in main.tsx -->
    <script defer src="/lang-subdomain.js"></script>
    <script defer src="/third-party-bootstrap.js"></script>
  </body>
</html>
